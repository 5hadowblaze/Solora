name: Solora
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.6"
settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.amirdzakwan.solora
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 12.16.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    exactVersion: 9.2.0
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 150.0.0
targets:
  Solora:
    type: application
    platform: iOS
    sources:
      - path: Solora
    entitlements:
      path: Solora/Solora.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: production
    info:
      path: Solora/Resources/Info.plist
      properties:
        CFBundleDisplayName: Solora
        NSMicrophoneUsageDescription: Talk with Solora using your voice.

        NSPhotoLibraryUsageDescription: Choose photos and Live Photos to bring your private memories to life.
        NSSpeechRecognitionUsageDescription: Turn your spoken reflection into a private Solora memory.
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "$(GOOGLE_REVERSED_CLIENT_ID)"
    settings:
      base:
        DEVELOPMENT_TEAM: QYDB6YBZ34
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Solora
        GOOGLE_CLIENT_ID: 48257854814-9ecfg77kh1l8jdhanpjip4madvdp4emq.apps.googleusercontent.com
        GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.48257854814-9ecfg77kh1l8jdhanpjip4madvdp4emq
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAppCheck
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: WebRTC
        product: WebRTC
  SoloraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoloraTests
    settings:
      base:
        DEVELOPMENT_TEAM: QYDB6YBZ34
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Solora
schemes:
  Solora:
    shared: true
    build:
      targets:
        Solora: all
        SoloraTests: [test]
    test:
      targets:
        - SoloraTests
    run:
      config: Debug
      environmentVariables:
        AppCheckDebugToken: "$(APP_CHECK_DEBUG_TOKEN)"
