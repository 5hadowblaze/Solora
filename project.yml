name: Solora
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.6"
settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.amirdzakwan.solora
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 12.16.0
targets:
  Solora:
    type: application
    platform: iOS
    sources:
      - path: Solora
    settings:
      base:
        DEVELOPMENT_TEAM: QYDB6YBZ34
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Solora
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Solora
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
  SoloraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoloraTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Solora
schemes:
  Solora:
    shared: true
    build:
      targets:
        Solora: all
        SoloraTests: [test]
    test:
      targets:
        - SoloraTests
